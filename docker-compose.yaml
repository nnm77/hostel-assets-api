version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-changeme-in-production"
    volumes:
      - db_data:/data
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    # For production, use gunicorn instead:
    # command: gunicorn hostel_api.wsgi:application --bind 0.0.0.0:8000 --workers 4

volumes:
  db_data:

